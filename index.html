<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio Arcaico - La Notte del Classico</title>
    <!-- Google Fonts for an ancient, premium look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #c5a059;
            --primary-dark: #121212;
            --glass-bg: rgba(18, 18, 18, 0.7);
            --accent-glow: rgba(197, 160, 89, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background-color: var(--primary-dark);
            font-family: 'Montserrat', sans-serif;
            color: #ffffff;
        }

        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: url('Gemini_Generated_Image_jjh89yjjh89yjjh8.png') no-repeat center center;
            background-size: cover;
            filter: brightness(0.6) contrast(1.1);
            transition: filter 2s ease;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
        }

        .content {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            letter-spacing: 0.2rem;
            color: var(--primary-gold);
            text-shadow: 0 0 20px rgba(197, 160, 89, 0.5);
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1.5s forwards 0.5s;
        }

        .master-button {
            position: relative;
            background: none;
            border: 1px solid var(--primary-gold);
            padding: 1.2rem 3rem;
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            color: var(--primary-gold);
            cursor: pointer;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border-radius: 2px;
            opacity: 0;
            animation: fadeIn 2s forwards 1.5s;
        }

        .master-button:hover {
            color: var(--primary-dark);
            background: var(--primary-gold);
            box-shadow: 0 0 30px var(--accent-glow);
            transform: scale(1.05);
        }

        .master-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300%;
            height: 300%;
            background: rgba(255, 255, 255, 0.1);
            transform: translate(-50%, -50%) rotate(45deg) translateY(100%);
            transition: transform 0.6s ease;
        }

        .master-button:hover::before {
            transform: translate(-50%, -50%) rotate(45deg) translateY(-100%);
        }

        .status {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            letter-spacing: 0.1rem;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 2s forwards 2.5s;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        /* Ambient particles */
        #dust-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="background-container" id="bg"></div>
    <div class="overlay"></div>
    <canvas id="dust-canvas"></canvas>

    <div class="content">
        <h1>Officina Alchemica</h1>
        <button class="master-button" id="playBtn">ATTIVA L'AMBIENTE</button>
        <div class="status" id="audioStatus">Silenzio Sacerdotale</div>
    </div>

    <audio id="bgAudio" loop>
        <source src="ambient_lab.mp3" type="audio/mpeg">
    </audio>

    <script>
        const playBtn = document.getElementById('playBtn');
        const audio = document.getElementById('bgAudio');
        const statusText = document.getElementById('audioStatus');
        const bg = document.getElementById('bg');
        let isPlaying = false;

        playBtn.addEventListener('click', () => {
            if (!isPlaying) {
                audio.play().then(() => {
                    isPlaying = true;
                    playBtn.textContent = "SILENZIA L'ECO";
                    statusText.textContent = "L'atmosfera è vibrante";
                    bg.style.filter = "brightness(0.9) contrast(1.1)";
                }).catch(err => {
                    console.error("Audio playback error:", err);
                    statusText.textContent = "Interazione richiesta";
                });
            } else {
                audio.pause();
                isPlaying = false;
                playBtn.textContent = "ATTIVA L'AMBIENTE";
                statusText.textContent = "Silenzio Sacerdotale";
                bg.style.filter = "brightness(0.6) contrast(1.1)";
            }
        });

        // Dust/Atmosphere effect
        const canvas = document.getElementById('dust-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(197, 160, 89, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
